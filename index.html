<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="老司机导航 - 精选互联网资源导航，发现好用的网站和工具">
  <meta name="theme-color" content="#5B8DEF">
  <title>老司机导航 - 互联网资源导航</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect x='8' y='42' width='84' height='36' rx='10' fill='%235B8DEF'/%3E%3Crect x='28' y='25' width='44' height='20' rx='6' fill='%237DA5F3'/%3E%3Ccircle cx='28' cy='78' r='14' fill='%23333'/%3E%3Ccircle cx='28' cy='78' r='8' fill='%23fff'/%3E%3Ccircle cx='72' cy='78' r='14' fill='%23333'/%3E%3Ccircle cx='72' cy='78' r='8' fill='%23fff'/%3E%3Crect x='38' y='56' width='24' height='6' rx='3' fill='%23fff' opacity='.7'/%3E%3C/svg%3E">
</head>
<body>
  <div class="header-placeholder"></div>
  <div class="content"></div>

  <button class="back-to-top" id="backToTop" aria-label="回到顶部">↑</button>

  <div class="modal-overlay" id="addLinkModal">
    <div class="modal">
      <h3 class="modal-title" id="modalTitle">添加链接</h3>
      <div class="modal-field">
        <label class="modal-label">标题</label>
        <input class="modal-input" id="linkTitle" type="text" placeholder="输入网站名称" autocomplete="off">
      </div>
      <div class="modal-field">
        <label class="modal-label">链接</label>
        <input class="modal-input" id="linkUrl" type="url" placeholder="https://example.com" autocomplete="off">
      </div>
      <div class="modal-field">
        <label class="modal-label">描述（可选）</label>
        <input class="modal-input" id="linkDesc" type="text" placeholder="一句话描述这个网站" autocomplete="off">
      </div>
      <div class="modal-actions">
        <button class="modal-btn" id="modalCancel">取消</button>
        <button class="modal-btn primary" id="modalConfirm">确认</button>
      </div>
    </div>
  </div>

  <script src="assets/js/data/init.js"></script>
  <script src="assets/js/data/ai.js"></script>
  <script src="assets/js/data/tools.js"></script>
  <script src="assets/js/data/desktop.js"></script>
  <script src="assets/js/data/game.js"></script>
  <script src="assets/js/data/anime.js"></script>
  <script src="assets/js/data/movie.js"></script>
  <script src="assets/js/data/manga.js"></script>
  <script src="assets/js/data/novel.js"></script>
  <script src="assets/js/data/ebook.js"></script>
  <script src="assets/js/utils/theme.js"></script>
  <script src="assets/js/utils/storage.js"></script>
  <script src="assets/js/components/widgets.js"></script>
  <script src="assets/js/components/header.js"></script>
  <script src="assets/js/components/linkCard.js"></script>
  <script src="assets/js/components/category.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
